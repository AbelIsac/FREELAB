{% extends "base.html" %}
{% block title %}Mi Carrito - Marketplace Estudiantil{% endblock %}
{% block content %}
<div class="carrito-container">
    <div class="carrito-header">
        <h1>🛒 Mi carrito</h1>
        <p>Revisa los productos que has agregado</p>
    </div>

    <div id="carritoVacio" class="carrito-vacio" style="display: none;">
        <i class="fas fa-shopping-cart" style="font-size: 4rem; color: #cbd5e1;"></i>
        <p>Tu carrito está vacío</p>
        <a href="{{ url_for('explorar_productos') }}" class="btn btn-primary">Explorar productos</a>
    </div>

    <div id="carritoLleno" style="display: none;">
        <div class="carrito-items" id="carritoItems"></div>
        <div class="carrito-resumen">
            <div class="resumen-card">
                <h3>Resumen de compra</h3>
                <div class="resumen-line">
                    <span>Subtotal:</span>
                    <span id="subtotalCarrito">$0</span>
                </div>
                <div class="resumen-line total">
                    <span><strong>Total:</strong></span>
                    <span><strong id="totalCarrito">$0</strong></span>
                </div>
                <button id="procederPago" class="btn-pagar">
                    <i class="fas fa-credit-card"></i> Proceder al pago
                </button>
                <button id="vaciarCarrito" class="btn-vaciar">
                    <i class="fas fa-trash-alt"></i> Vaciar carrito
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    function renderCarrito() {
        const carrito = JSON.parse(localStorage.getItem('carrito')) || [];
        const vacioDiv = document.getElementById('carritoVacio');
        const llenoDiv = document.getElementById('carritoLleno');
        const container = document.getElementById('carritoItems');
        
        if (carrito.length === 0) {
            vacioDiv.style.display = 'block';
            llenoDiv.style.display = 'none';
            return;
        }
        vacioDiv.style.display = 'none';
        llenoDiv.style.display = 'block';
        container.innerHTML = '';
        let subtotal = 0;
        carrito.forEach((item, index) => {
            const totalItem = item.precio * item.cantidad;
            subtotal += totalItem;
            const itemDiv = document.createElement('div');
            itemDiv.className = 'carrito-item';
            itemDiv.innerHTML = `
                <div class="item-imagen">
                    <img src="${item.imagen || 'https://images.unsplash.com/photo-1516321310764-9f3c9619d7d4?w=100&h=100&fit=crop'}" alt="${item.titulo}">
                </div>
                <div class="item-detalles">
                    <h4>${escapeHtml(item.titulo)}</h4>
                    <p class="item-precio">$${item.precio.toLocaleString()} c/u</p>
                    <div class="item-cantidad">
                        <button class="cantidad-btn" onclick="cambiarCantidad(${index}, -1)">-</button>
                        <span>${item.cantidad}</span>
                        <button class="cantidad-btn" onclick="cambiarCantidad(${index}, 1)">+</button>
                    </div>
                </div>
                <div class="item-subtotal">$${totalItem.toLocaleString()}</div>
                <button class="btn-eliminar" onclick="eliminarDelCarrito(${index})"><i class="fas fa-times"></i></button>
            `;
            container.appendChild(itemDiv);
        });
        document.getElementById('subtotalCarrito').innerText = `$${subtotal.toLocaleString()}`;
        document.getElementById('totalCarrito').innerText = `$${subtotal.toLocaleString()}`;
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function cambiarCantidad(index, delta) {
        let carrito = JSON.parse(localStorage.getItem('carrito'));
        if (!carrito) return;
        const nuevaCantidad = carrito[index].cantidad + delta;
        if (nuevaCantidad <= 0) {
            carrito.splice(index, 1);
        } else {
            carrito[index].cantidad = nuevaCantidad;
        }
        localStorage.setItem('carrito', JSON.stringify(carrito));
        renderCarrito();
        actualizarContadorGlobal();
    }
    
    function eliminarDelCarrito(index) {
        let carrito = JSON.parse(localStorage.getItem('carrito'));
        carrito.splice(index, 1);
        localStorage.setItem('carrito', JSON.stringify(carrito));
        renderCarrito();
        actualizarContadorGlobal();
    }
    
    function actualizarContadorGlobal() {
        const carrito = JSON.parse(localStorage.getItem('carrito')) || [];
        const totalItems = carrito.reduce((sum, i) => sum + i.cantidad, 0);
        const contador = document.getElementById('cartCount');
        if (contador) contador.innerText = totalItems;
    }
    
    document.getElementById('vaciarCarrito')?.addEventListener('click', () => {
        localStorage.removeItem('carrito');
        renderCarrito();
        actualizarContadorGlobal();
        Swal.fire('Carrito vacío', 'Todos los productos han sido eliminados', 'info');
    });
    
    document.getElementById('procederPago')?.addEventListener('click', async () => {
        const carrito = JSON.parse(localStorage.getItem('carrito'));
        if (!carrito || carrito.length === 0) return;
        Swal.fire({
            title: 'Procesando...',
            text: 'Preparando tu pago',
            allowOutsideClick: false,
            didOpen: () => { Swal.showLoading(); }
        });
        try {
            const response = await fetch("{{ url_for('checkout_carrito') }}", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ items: carrito })
            });
            const data = await response.json();
            if (data.success) {
                window.location.href = "{{ url_for('checkout_carrito') }}";
            } else {
                Swal.fire('Error', 'No se pudo procesar el carrito', 'error');
            }
        } catch (error) {
            Swal.fire('Error', 'Error de conexión', 'error');
        }
    });
    
    renderCarrito();
</script>

<style>
    .carrito-container {
        max-width: 1200px;
        margin: 2rem auto;
        padding: 1rem;
    }
    .carrito-header {
        text-align: center;
        margin-bottom: 2rem;
    }
    .carrito-header h1 {
        font-size: 2rem;
        color: #1e293b;
    }
    .carrito-header p {
        color: #64748b;
    }
    .carrito-vacio {
        text-align: center;
        padding: 4rem;
        background: white;
        border-radius: 20px;
    }
    .carrito-items {
        background: white;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }
    .carrito-item {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 1.2rem;
        border-bottom: 1px solid #e2e8f0;
    }
    .item-imagen img {
        width: 80px;
        height: 80px;
        object-fit: cover;
        border-radius: 12px;
    }
    .item-detalles {
        flex: 2;
    }
    .item-detalles h4 {
        margin: 0 0 0.5rem 0;
        color: #1e293b;
    }
    .item-precio {
        color: #059669;
        font-weight: 500;
        margin: 0 0 0.5rem 0;
    }
    .item-cantidad {
        display: flex;
        align-items: center;
        gap: 0.8rem;
    }
    .cantidad-btn {
        width: 30px;
        height: 30px;
        border: 1px solid #cbd5e1;
        background: white;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s;
    }
    .cantidad-btn:hover {
        background: #f1f5f9;
    }
    .item-subtotal {
        font-weight: bold;
        font-size: 1.1rem;
        color: #0f172a;
        min-width: 100px;
        text-align: right;
    }
    .btn-eliminar {
        background: none;
        border: none;
        color: #ef4444;
        font-size: 1.2rem;
        cursor: pointer;
        padding: 0.5rem;
        transition: transform 0.2s;
    }
    .btn-eliminar:hover {
        transform: scale(1.1);
    }
    .carrito-resumen {
        margin-top: 2rem;
        display: flex;
        justify-content: flex-end;
    }
    .resumen-card {
        background: white;
        border-radius: 20px;
        padding: 1.5rem;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }
    .resumen-card h3 {
        margin-top: 0;
        margin-bottom: 1rem;
    }
    .resumen-line {
        display: flex;
        justify-content: space-between;
        margin-bottom: 0.8rem;
    }
    .resumen-line.total {
        font-size: 1.2rem;
        border-top: 1px solid #e2e8f0;
        padding-top: 0.8rem;
        margin-top: 0.8rem;
    }
    .btn-pagar {
        width: 100%;
        background: linear-gradient(135deg, #3b82f6, #2563eb);
        color: white;
        border: none;
        padding: 0.8rem;
        border-radius: 12px;
        font-weight: 600;
        margin-top: 1rem;
        cursor: pointer;
        transition: transform 0.2s;
    }
    .btn-pagar:hover {
        transform: translateY(-2px);
    }
    .btn-vaciar {
        width: 100%;
        background: #f1f5f9;
        color: #ef4444;
        border: none;
        padding: 0.8rem;
        border-radius: 12px;
        font-weight: 600;
        margin-top: 0.8rem;
        cursor: pointer;
        transition: all 0.2s;
    }
    .btn-vaciar:hover {
        background: #fee2e2;
    }
    @media (max-width: 768px) {
        .carrito-item {
            flex-wrap: wrap;
        }
        .item-subtotal {
            text-align: left;
            margin-left: auto;
        }
        .btn-eliminar {
            order: 3;
        }
    }
</style>
{% endblock %}
