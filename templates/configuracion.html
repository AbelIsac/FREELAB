{% extends "base.html" %}

{% block title %}Configuración - Marketplace Estudiantil{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/configuracion.css') }}">
{% endblock %}

{% block content %}
<div class="dashboard-vendedor-full">
    <div class="dashboard-full">
        <div class="configuracion-container">
            <div class="perfil-card">
                <div class="perfil-header">
                    <div class="perfil-avatar">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <h2>{{ user.name }}</h2>
                    <p>{{ user.email }}</p>
                </div>
                <div class="perfil-body">
                    <form>
                        <div class="form-group-modern">
                            <label><i class="fas fa-user"></i> Nombre completo</label>
                            <input type="text" class="input-modern" value="{{ user.name }}" disabled>
                        </div>
                        <div class="form-group-modern">
                            <label><i class="fas fa-envelope"></i> Correo electrónico</label>
                            <input type="email" class="input-modern" value="{{ user.email }}" disabled>
                        </div>
                        <div class="form-group-modern">
                            <label><i class="fas fa-phone"></i> Teléfono (opcional)</label>
                            <input type="tel" class="input-modern" placeholder="+56 9 XXXX XXXX">
                        </div>
                        <div class="form-group-modern">
                            <label><i class="fas fa-info-circle"></i> Biografía / Descripción</label>
                            <textarea rows="3" class="input-modern" placeholder="Cuéntales a los compradores sobre ti..."></textarea>
                        </div>
                        <div style="text-align: right;">
                            <button class="btn-save" disabled style="opacity: 0.5; cursor: not-allowed;">
                                <i class="fas fa-save"></i> Guardar (próximamente)
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            <div style="text-align: center; margin-top: 2rem;">
                <a href="{{ url_for('dashboard_estudiante', user_id=session['user']['id']) }}" class="btn-link">
                    <i class="fas fa-arrow-left"></i> Volver al dashboard
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
